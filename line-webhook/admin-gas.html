<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>後台管理 | I LUV尹澤鎂研</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bronze: #C8906B;
  --bronze-light: #D4A87A;
  --bronze-bright: #B87A4A;
  --bronze-bg: rgba(200,144,107,0.08);
  --bronze-border: rgba(200,144,107,0.25);
  --sage: #8FA48E;
  --sage-dark: #5F7560;
  --sage-deep: #3B4C3C;
  --sage-mist: #D4E0D5;
  --bg: #f5f5f7;
  --card: #ffffff;
  --border: #e5e7eb;
  --text-primary: #1a202c;
  --text-secondary: #6b7280;
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.08);
  --success: #22c55e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}

/* ===== HEADER ===== */
.admin-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.admin-header h1 {
  font-size: 17px; font-weight: 700;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.admin-header h1 i { color: var(--bronze); font-size: 18px; }
.header-right {
  text-align: right;
}
.header-brand {
  font-size: 11px; color: var(--text-secondary);
}
.header-user {
  font-size: 11px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 5px;
  justify-content: flex-end;
}
.header-user i { color: var(--success); font-size: 8px; }

/* ===== TABS ===== */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 52px;
  z-index: 99;
}
.tab-btn {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tab-btn.active {
  color: var(--bronze-bright);
  border-bottom-color: var(--bronze);
}
.tab-btn i { font-size: 16px; }

/* ===== CONTENT ===== */
.admin-content {
  padding: 16px;
  max-width: 800px;
  margin: 0 auto;
  padding-bottom: 100px;
}

/* ===== SERVICE CARD ===== */
.service-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: all 0.2s;
}
.service-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  min-height: 52px;
}
.service-header h3 {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-primary);
}
.service-header .count {
  background: var(--sage-mist);
  color: var(--sage-dark);
  font-size: 12px;
  padding: 2px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.service-header .chevron {
  color: var(--text-secondary);
  transition: transform 0.2s;
  font-size: 14px;
}
.service-header .chevron.open { transform: rotate(180deg); }
.service-body { padding: 0 16px 16px; }

/* ===== PHOTO GRID ===== */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.photo-cell {
  position: relative;
  aspect-ratio: 4/3;
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg);
  cursor: grab;
}
.photo-cell.sortable-ghost { opacity: 0.4; }
.photo-cell.sortable-drag {
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  border-radius: 10px;
}
.photo-cell img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}
.photo-cell .del-btn {
  position: absolute;
  top: 6px; right: 6px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
@media (hover: none) {
  .photo-cell .del-btn { opacity: 0.9; }
}
@media (hover: hover) {
  .photo-cell .del-btn { opacity: 0; transition: opacity 0.2s; }
  .photo-cell:hover .del-btn { opacity: 1; }
}

.photo-cell .drag-handle {
  position: absolute;
  bottom: 6px; left: 6px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  touch-action: none;
}
@media (hover: none) {
  .photo-cell .drag-handle { opacity: 0.8; }
}
@media (hover: hover) {
  .photo-cell .drag-handle { opacity: 0; transition: opacity 0.2s; }
  .photo-cell:hover .drag-handle { opacity: 1; }
}

.add-photo-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  background: none;
  border: 2px dashed var(--border);
  border-radius: 12px;
  color: var(--text-secondary);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.add-photo-btn:active {
  border-color: var(--bronze);
  background: var(--bronze-bg);
  color: var(--bronze);
}
.add-photo-btn i { font-size: 18px; }

/* ===== VIDEO LIST ===== */
.video-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  min-height: 64px;
}
.video-item:last-child { border-bottom: none; }
.video-item.sortable-ghost { opacity: 0.4; }
.video-item.sortable-drag {
  background: var(--card);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  border-radius: 10px;
  padding: 12px;
}

.video-drag {
  width: 32px; height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 16px;
  flex-shrink: 0;
  cursor: grab;
  touch-action: none;
}
.video-thumb {
  width: 88px; height: 50px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: #000;
}
.video-thumb img { width: 100%; height: 100%; object-fit: cover; }
.video-id {
  flex: 1;
  font-size: 12px;
  color: var(--text-secondary);
  word-break: break-all;
  min-width: 0;
}
.video-del {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--danger-bg);
  color: var(--danger);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}

.add-video-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.add-video-row input {
  flex: 1;
  min-width: 0;
  padding: 12px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  color: var(--text-primary);
  background: var(--card);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.add-video-row input:focus {
  border-color: var(--bronze);
  box-shadow: 0 0 0 3px var(--bronze-bg);
}
.add-video-row button {
  padding: 12px 14px;
  background: var(--sage);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  flex-shrink: 0;
  transition: all 0.2s;
}
.add-video-row button:active { background: var(--sage-dark); transform: scale(0.98); }

.video-count {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

/* ===== SAVE BAR ===== */
.save-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  z-index: 100;
}
.save-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 14px;
  background: var(--bronze);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.save-btn:active { transform: scale(0.98); }
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ===== LOADING ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 300;
  gap: 12px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--bronze);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-overlay p { font-size: 14px; color: var(--text-secondary); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== CUSTOMER PHOTOS ===== */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.search-bar input {
  flex: 1; min-width: 0;
  padding: 12px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 15px; font-family: inherit;
  color: var(--text-primary);
  background: var(--card);
  outline: none; -webkit-appearance: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--bronze); box-shadow: 0 0 0 3px var(--bronze-bg); }
.search-bar button {
  padding: 12px 14px;
  background: var(--sage); color: #fff;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  font-family: inherit; flex-shrink: 0;
}
.customer-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
}
.customer-card-header {
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: var(--text-secondary);
}
.customer-card-header .cname {
  font-weight: 600; color: var(--text-primary); font-size: 15px;
}
.customer-card-header .cphoto-count {
  font-size: 12px; color: var(--text-secondary);
}
.customer-card-header .ctime {
  margin-left: auto; font-size: 12px; white-space: nowrap;
}
.customer-photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 6px;
  padding: 0 12px 8px;
}
.customer-photo-grid img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  border-radius: 8px; cursor: pointer;
}
.customer-card-services {
  padding: 0 16px 6px;
  display: flex; flex-wrap: wrap; gap: 4px;
}
.customer-card-services .csvc {
  background: var(--bronze-bg); color: var(--bronze-bright);
  font-size: 12px; padding: 2px 8px; border-radius: 8px;
}
.customer-card-note {
  padding: 10px 16px;
}
.customer-card-note textarea {
  width: 100%; min-height: 48px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px; font-family: inherit;
  color: var(--text-primary);
  background: var(--bg);
  outline: none; resize: vertical;
}
.customer-card-note textarea:focus { border-color: var(--bronze); }
.note-save-btn {
  margin-top: 6px; padding: 6px 14px;
  background: var(--bronze); color: #fff;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.note-save-btn:disabled { opacity: 0.5; }
.customer-count {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 10px;
}
.empty-hint {
  text-align: center; padding: 40px 20px;
  color: var(--text-secondary); font-size: 14px; line-height: 2;
}
.empty-hint i { font-size: 32px; display: block; margin-bottom: 8px; color: var(--border); }

/* ===== AUTH SCREEN ===== */
.auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.auth-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 28px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.auth-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
.auth-card .sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
.auth-card .spinner-small {
  width: 28px; height: 28px; margin: 16px auto;
  border: 3px solid var(--border);
  border-top-color: var(--bronze);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.auth-card .err-msg { color: var(--danger); font-size: 14px; margin-top: 16px; line-height: 1.5; }
.pin-display {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 24px;
  font-family: inherit;
  text-align: center;
  letter-spacing: 12px;
  color: var(--text-primary);
  background: var(--bg);
  min-height: 54px;
  margin-bottom: 16px;
  user-select: none;
}
.pin-dots { display: inline-block; }
.pin-dots span {
  display: inline-block;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--border);
  margin: 0 6px;
  transition: background 0.15s;
}
.pin-dots span.filled { background: var(--bronze); }
.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.numpad-btn {
  padding: 16px;
  font-size: 22px;
  font-weight: 600;
  font-family: inherit;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--card);
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.numpad-btn:active { background: var(--bronze-bg); transform: scale(0.95); }
.numpad-btn.del { font-size: 16px; color: var(--text-secondary); }
.numpad-btn.empty { visibility: hidden; border: none; }
.auth-card .login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--bronze);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.auth-card .login-btn:active { transform: scale(0.98); }
.auth-card .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== LIGHTBOX ===== */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.lightbox img {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 8px;
}
.lightbox-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: #fff;
  border: none;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== EMPTY STATE ===== */
.empty-hint {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  padding: 40px 0;
  line-height: 1.8;
}
.empty-hint i { font-size: 36px; color: #ddd; margin-bottom: 8px; display: block; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">
  <!-- LOGIN -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <h2>I LUV尹澤鎂研</h2>
      <p class="sub">後台管理系統</p>
      <div style="margin-top:20px;">
        <div class="pin-display" id="pinDisplay">
          <div class="pin-dots" id="pinDots">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="numpad" id="numpad">
          <button class="numpad-btn" onclick="pinPress('1')">1</button>
          <button class="numpad-btn" onclick="pinPress('2')">2</button>
          <button class="numpad-btn" onclick="pinPress('3')">3</button>
          <button class="numpad-btn" onclick="pinPress('4')">4</button>
          <button class="numpad-btn" onclick="pinPress('5')">5</button>
          <button class="numpad-btn" onclick="pinPress('6')">6</button>
          <button class="numpad-btn" onclick="pinPress('7')">7</button>
          <button class="numpad-btn" onclick="pinPress('8')">8</button>
          <button class="numpad-btn" onclick="pinPress('9')">9</button>
          <button class="numpad-btn empty"></button>
          <button class="numpad-btn" onclick="pinPress('0')">0</button>
          <button class="numpad-btn del" onclick="pinDelete()"><i class="fas fa-backspace"></i></button>
        </div>
        <button class="login-btn" onclick="doLogin()" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> 登入
        </button>
        <input type="hidden" id="pinInput" value="">
      </div>
      <div class="err-msg hidden" id="authErr"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainScreen" class="hidden">
    <header class="admin-header">
      <h1><i class="fas fa-spa"></i> 後台管理</h1>
      <div class="header-right">
        <div class="header-brand">I LUV尹澤鎂研</div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="photos" onclick="switchTab('photos')">
        <i class="fas fa-images"></i> 服務照片
      </button>
      <button class="tab-btn" data-tab="videos" onclick="switchTab('videos')">
        <i class="fas fa-video"></i> 施作影片
      </button>
      <button class="tab-btn" data-tab="customer" onclick="switchTab('customer')">
        <i class="fas fa-folder-open"></i> 客戶照片
      </button>
    </div>

    <div class="admin-content" id="tabPhotos"></div>
    <div class="admin-content hidden" id="tabVideos"></div>
    <div class="admin-content hidden" id="tabCustomer"></div>

    <div class="save-bar">
      <button class="save-btn" id="saveBtn" onclick="doSave()">
        <i class="fas fa-save"></i> 儲存變更
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="loading-overlay hidden" id="loading">
    <div class="spinner"></div>
    <p>處理中...</p>
  </div>

  <div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    <img id="lightboxImg" src="" alt="">
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)">

<script>
// ══════════════════════════════════════════
//  google.script.run Promise wrapper
// ══════════════════════════════════════════
function gasRun(fnName) {
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject);
    runner[fnName].apply(runner, args);
  });
}

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
var services = [];
var videos = [];
var dirty = false;
var uploadingServiceIdx = -1;
var expandedServices = {};
var sortableInstances = [];
var currentPin = '';

// ══════════════════════════════════════════
//  PIN Numpad
// ══════════════════════════════════════════
var pinValue = '';
var PIN_MAX = 10;

function pinPress(num) {
  if (pinValue.length >= PIN_MAX) return;
  pinValue += num;
  document.getElementById('pinInput').value = pinValue;
  updatePinDots();
  hideAuthError();
}

function pinDelete() {
  if (pinValue.length === 0) return;
  pinValue = pinValue.slice(0, -1);
  document.getElementById('pinInput').value = pinValue;
  updatePinDots();
}

function updatePinDots() {
  var dots = document.getElementById('pinDots');
  var html = '';
  for (var i = 0; i < Math.max(4, pinValue.length); i++) {
    html += '<span' + (i < pinValue.length ? ' class="filled"' : '') + '></span>';
  }
  dots.innerHTML = html;
}

// ══════════════════════════════════════════
//  PIN Login
// ══════════════════════════════════════════
// 檢查 localStorage 是否有記住的 PIN
(function autoLogin() {
  try {
    var saved = localStorage.getItem('admin_pin');
    if (saved) {
      pinValue = saved;
      document.getElementById('pinInput').value = saved;
      updatePinDots();
      doLogin();
    }
  } catch(e) {}
})();

function doLogin() {
  var pin = document.getElementById('pinInput').value.trim();
  if (!pin) { showAuthError('請輸入 PIN 碼'); return; }

  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 驗證中...';
  hideAuthError();

  gasRun('clientCheckPin', pin)
    .then(function(result) {
      if (result.status === 'ok') {
        currentPin = pin;
        try { localStorage.setItem('admin_pin', pin); } catch(e) {}
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        loadData();
      } else {
        showAuthError(result.message || 'PIN 碼錯誤');
        pinValue = '';
        document.getElementById('pinInput').value = '';
        updatePinDots();
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入';
      }
    })
    .catch(function(e) {
      showAuthError('無法連線，請稍後再試');
      pinValue = '';
      document.getElementById('pinInput').value = '';
      updatePinDots();
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入';
    });
}

function showAuthError(msg) {
  var errEl = document.getElementById('authErr');
  errEl.textContent = msg;
  errEl.classList.remove('hidden');
}

function hideAuthError() {
  document.getElementById('authErr').classList.add('hidden');
}

// ══════════════════════════════════════════
//  Load Data
// ══════════════════════════════════════════
function loadData() {
  showLoading(true);
  gasRun('clientGetConfig', currentPin)
    .then(function(result) {
      if (result.status === 'ok') {
        services = result.services || [];
        videos = result.videos || [];
        // 預設展開第一個
        if (services.length && Object.keys(expandedServices).length === 0) {
          expandedServices[0] = true;
        }
        renderPhotos();
        renderVideos();
        dirty = false;
      } else {
        toast('載入失敗：' + (result.message || ''));
      }
      showLoading(false);
    })
    .catch(function(e) {
      toast('無法載入資料');
      showLoading(false);
    });
}

// ══════════════════════════════════════════
//  Tab switching
// ══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.getElementById('tabPhotos').classList.toggle('hidden', tab !== 'photos');
  document.getElementById('tabVideos').classList.toggle('hidden', tab !== 'videos');
  document.getElementById('tabCustomer').classList.toggle('hidden', tab !== 'customer');
  // 切到客戶照片時自動載入最新資料
  if (tab === 'customer') {
    searchCustomerPhotos();
  }
  // 切到客戶照片時隱藏儲存按鈕
  document.querySelector('.save-bar').style.display = (tab === 'customer') ? 'none' : '';
}

// ══════════════════════════════════════════
//  Render: Service Photos
// ══════════════════════════════════════════
function renderPhotos() {
  sortableInstances.forEach(function(s) { s.destroy(); });
  sortableInstances = [];

  var container = document.getElementById('tabPhotos');
  if (!services.length) {
    container.innerHTML = '<div class="empty-hint"><i class="fas fa-inbox"></i>尚無服務項目資料<br>請先在 GAS 執行 migratePhotos()</div>';
    return;
  }

  container.innerHTML = services.map(function(svc, si) {
    var isOpen = expandedServices[si] === true;
    var photos = svc.photos || [];
    return '<div class="service-card">' +
      '<div class="service-header" onclick="toggleExpand(' + si + ')">' +
        '<h3>' + escHtml(svc.title) + ' <span class="count">' + photos.length + ' 張</span></h3>' +
        '<i class="fas fa-chevron-down chevron ' + (isOpen ? 'open' : '') + '"></i>' +
      '</div>' +
      (isOpen ? '<div class="service-body">' +
        '<div class="photo-grid" data-si="' + si + '">' +
          photos.map(function(url, pi) {
            return '<div class="photo-cell" data-pi="' + pi + '">' +
              '<img src="' + escAttr(url) + '" loading="lazy" alt="" onclick="openLightbox(\'' + escAttr(url) + '\')">' +
              '<button class="del-btn" onclick="event.stopPropagation(); delPhoto(' + si + ', ' + pi + ')" title="刪除">' +
                '<i class="fas fa-times"></i>' +
              '</button>' +
              '<div class="drag-handle"><i class="fas fa-grip-vertical"></i></div>' +
            '</div>';
          }).join('') +
        '</div>' +
        '<button class="add-photo-btn" onclick="triggerUpload(' + si + ')">' +
          '<i class="fas fa-camera"></i> 新增照片' +
        '</button>' +
      '</div>' : '') +
    '</div>';
  }).join('');

  // Sortable for each photo grid
  document.querySelectorAll('.photo-grid').forEach(function(grid) {
    var si = parseInt(grid.dataset.si);
    var instance = new Sortable(grid, {
      animation: 200,
      delay: 100,
      delayOnTouchOnly: true,
      forceFallback: true,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      fallbackClass: 'sortable-drag',
      onEnd: function(evt) {
        var oldIdx = evt.oldIndex;
        var newIdx = evt.newIndex;
        if (oldIdx === newIdx) return;
        var arr = services[si].photos;
        var item = arr.splice(oldIdx, 1)[0];
        arr.splice(newIdx, 0, item);
        dirty = true;
        renderPhotos();
      }
    });
    sortableInstances.push(instance);
  });
}

function toggleExpand(si) {
  expandedServices[si] = !expandedServices[si];
  renderPhotos();
}

function delPhoto(si, pi) {
  if (!confirm('確定要刪除這張照片嗎？')) return;

  var url = services[si].photos[pi];
  var fileId = extractDriveFileId(url);
  if (fileId) {
    gasRun('clientDeletePhoto', currentPin, fileId).catch(function() {});
  }

  services[si].photos.splice(pi, 1);
  dirty = true;
  renderPhotos();
  toast('照片已移除');
}

function extractDriveFileId(url) {
  var m = url.match(/googleusercontent\.com\/d\/([^/?=]+)/);
  return m ? m[1] : null;
}

// ══════════════════════════════════════════
//  Photo Upload
// ══════════════════════════════════════════
function triggerUpload(si) {
  uploadingServiceIdx = si;
  document.getElementById('fileInput').click();
}

function handleFileSelect(event) {
  var files = Array.from(event.target.files);
  if (!files.length || uploadingServiceIdx < 0) return;

  var si = uploadingServiceIdx;
  showLoading(true);
  var uploaded = 0;

  function uploadNext(idx) {
    if (idx >= files.length) {
      renderPhotos();
      showLoading(false);
      toast('已上傳 ' + uploaded + ' 張照片');
      event.target.value = '';
      return;
    }

    var file = files[idx];
    var reader = new FileReader();
    reader.onload = function() {
      var base64 = reader.result.split(',')[1];
      gasRun('clientUploadPhoto', currentPin, base64, file.name, si)
        .then(function(result) {
          if (result.status === 'ok' && result.url) {
            services[si].photos.push(result.url);
            dirty = true;
            uploaded++;
          } else {
            toast('上傳失敗：' + (result.message || ''));
          }
          uploadNext(idx + 1);
        })
        .catch(function(e) {
          toast('上傳錯誤');
          uploadNext(idx + 1);
        });
    };
    reader.readAsDataURL(file);
  }

  uploadNext(0);
}

// ══════════════════════════════════════════
//  Render: Videos
// ══════════════════════════════════════════
var videoSortable = null;

function renderVideos() {
  if (videoSortable) { videoSortable.destroy(); videoSortable = null; }

  var container = document.getElementById('tabVideos');
  var listHtml = videos.map(function(id, vi) {
    return '<div class="video-item" data-vi="' + vi + '">' +
      '<div class="video-drag drag-handle-video"><i class="fas fa-grip-vertical"></i></div>' +
      '<div class="video-thumb">' +
        '<img src="https://i.ytimg.com/vi/' + escAttr(id) + '/hqdefault.jpg" loading="lazy" alt="">' +
      '</div>' +
      '<div class="video-id">' + escHtml(id) + '</div>' +
      '<button class="video-del" onclick="delVideo(' + vi + ')" title="刪除"><i class="fas fa-trash"></i></button>' +
    '</div>';
  }).join('');

  container.innerHTML =
    '<div class="add-video-row">' +
      '<input type="text" id="newVideoId" placeholder="YouTube 影片 ID 或網址" inputmode="url">' +
      '<button onclick="addVideo()"><i class="fas fa-plus"></i> 新增</button>' +
    '</div>' +
    '<div class="video-count">共 ' + videos.length + ' 部影片</div>' +
    '<div id="videoList">' +
    (videos.length ? listHtml : '<div class="empty-hint"><i class="fas fa-film"></i>尚無影片</div>') +
    '</div>';

  var listEl = document.getElementById('videoList');
  if (listEl && videos.length) {
    videoSortable = new Sortable(listEl, {
      animation: 200,
      delay: 100,
      delayOnTouchOnly: true,
      forceFallback: true,
      handle: '.drag-handle-video',
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      fallbackClass: 'sortable-drag',
      onEnd: function(evt) {
        var oldIdx = evt.oldIndex;
        var newIdx = evt.newIndex;
        if (oldIdx === newIdx) return;
        var item = videos.splice(oldIdx, 1)[0];
        videos.splice(newIdx, 0, item);
        dirty = true;
        renderVideos();
      }
    });
  }
}

function addVideo() {
  var input = document.getElementById('newVideoId');
  var val = input.value.trim();
  if (!val) return;

  var id = extractYoutubeId(val);
  if (!id) { toast('無效的 YouTube ID 或網址'); return; }
  if (videos.indexOf(id) >= 0) { toast('此影片已存在'); return; }

  videos.unshift(id);
  dirty = true;
  input.value = '';
  renderVideos();
  toast('影片已新增');
}

function delVideo(vi) {
  videos.splice(vi, 1);
  dirty = true;
  renderVideos();
  toast('影片已移除');
}

function extractYoutubeId(input) {
  if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
  try {
    var url = new URL(input);
    if (url.searchParams.has('v')) return url.searchParams.get('v');
    if (url.hostname === 'youtu.be') return url.pathname.slice(1).split('/')[0];
    var m = url.pathname.match(/\/shorts\/([A-Za-z0-9_-]+)/);
    if (m) return m[1];
    m = url.pathname.match(/\/embed\/([A-Za-z0-9_-]+)/);
    if (m) return m[1];
  } catch (e) {}
  if (input.length >= 10 && input.length <= 12 && /^[A-Za-z0-9_-]+$/.test(input)) return input;
  return null;
}

// ══════════════════════════════════════════
//  Save
// ══════════════════════════════════════════
function doSave() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  showLoading(true);

  var svcData = services.map(function(s) {
    return { index: s.index, title: s.title, photos: s.photos };
  });

  gasRun('clientSavePhotos', currentPin, svcData)
    .then(function(result) {
      if (result.status !== 'ok') {
        toast('照片儲存失敗：' + (result.message || ''));
        showLoading(false);
        btn.disabled = false;
        return;
      }
      return gasRun('clientSaveVideos', currentPin, videos);
    })
    .then(function(result) {
      if (!result) return;
      if (result.status !== 'ok') {
        toast('影片儲存失敗：' + (result.message || ''));
      } else {
        dirty = false;
        toast('儲存成功！');
      }
      showLoading(false);
      btn.disabled = false;
    })
    .catch(function(e) {
      toast('儲存錯誤');
      showLoading(false);
      btn.disabled = false;
    });
}

// ══════════════════════════════════════════
//  Lightbox
// ══════════════════════════════════════════
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
  document.getElementById('lightboxImg').src = '';
}

// ══════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════
function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
//  Customer Photos: Search + Notes
// ══════════════════════════════════════════
var customerPhotosLoaded = false;
var customerPhotos = [];

function searchCustomerPhotos() {
  var keyword = (document.getElementById('customerSearch') || {}).value || '';
  showLoading(true);
  gasRun('clientSearchPhotos', currentPin, keyword)
    .then(function(result) {
      showLoading(false);
      if (result.status === 'ok') {
        customerPhotos = result.customers || [];
        customerPhotosLoaded = true;
        renderCustomerPhotos();
      } else {
        toast('搜尋失敗：' + (result.message || ''));
      }
    })
    .catch(function(e) {
      showLoading(false);
      toast('搜尋錯誤：' + (e.message || e));
    });
}

function renderCustomerPhotos() {
  var container = document.getElementById('tabCustomer');
  var searchHtml =
    '<div class="search-bar">' +
      '<input type="text" id="customerSearch" placeholder="搜尋客戶名稱、服務項目、筆記..." value="' + escAttr((document.getElementById('customerSearch') || {}).value || '') + '" onkeydown="if(event.key===\'Enter\')searchCustomerPhotos()">' +
      '<button onclick="searchCustomerPhotos()"><i class="fas fa-search"></i> 搜尋</button>' +
      '<button onclick="customerPhotos=[];renderCustomerPhotos();searchCustomerPhotos()" title="重新整理" style="min-width:auto;padding:8px 12px"><i class="fas fa-sync-alt"></i></button>' +
    '</div>';

  if (!customerPhotos.length) {
    container.innerHTML = searchHtml + '<div class="empty-hint"><i class="fas fa-camera"></i>尚無客戶照片</div>';
    return;
  }

  var totalPhotos = customerPhotos.reduce(function(s, c) { return s + c.photos.length; }, 0);

  var cardsHtml = customerPhotos.map(function(c) {
    var photosHtml = c.photos.map(function(ph) {
      return '<img src="' + escAttr(ph.thumbUrl) + '" data-full="' + escAttr(ph.photoUrl || ph.thumbUrl) + '" loading="lazy" class="zoomable-photo">';
    }).join('');

    var svcsHtml = c.services.length
      ? '<div class="customer-card-services">' + c.services.map(function(s) { return '<span class="csvc">' + escHtml(s) + '</span>'; }).join('') + '</div>'
      : '';

    return '<div class="customer-card">' +
      '<div class="customer-card-header">' +
        '<span class="cname">' + escHtml(c.name) + '</span>' +
        '<span class="cphoto-count">' + c.photos.length + ' 張照片</span>' +
        '<span class="ctime">' + escHtml(c.latestTime) + '</span>' +
      '</div>' +
      svcsHtml +
      '<div class="customer-photo-grid">' + photosHtml + '</div>' +
      '<div class="customer-card-note">' +
        '<textarea data-customer="' + escAttr(c.name) + '" placeholder="新增筆記...">' + escHtml(c.note || '') + '</textarea>' +
        '<button class="note-save-btn" onclick="saveNote(this,\'' + escAttr(c.name).replace(/'/g, "\\'") + '\')">儲存筆記</button>' +
      '</div>' +
    '</div>';
  }).join('');

  container.innerHTML = searchHtml +
    '<div class="customer-count">共 ' + customerPhotos.length + ' 位客戶、' + totalPhotos + ' 張照片</div>' +
    cardsHtml;

  // 事件委派：點擊照片開啟 lightbox
  container.querySelectorAll('.zoomable-photo').forEach(function(img) {
    img.addEventListener('click', function() {
      openLightbox(this.getAttribute('data-full'));
    });
  });
}

function saveNote(btn, customerName) {
  var textarea = btn.parentElement.querySelector('textarea');
  var note = textarea.value;
  btn.disabled = true;
  btn.textContent = '儲存中...';
  gasRun('clientSaveNote', currentPin, customerName, note)
    .then(function(result) {
      btn.disabled = false;
      btn.textContent = '儲存筆記';
      if (result.status === 'ok') {
        toast('筆記已儲存');
      } else {
        toast('儲存失敗：' + (result.message || ''));
      }
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = '儲存筆記';
      toast('儲存錯誤');
    });
}

window.addEventListener('beforeunload', function(e) {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});
</script>
